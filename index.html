<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <style>
        body { background-color: #141414; font-family: Arial, sans-serif; color: #fff; }
        .container { max-width: 500px; margin: auto; padding: 20px; border-radius: 10px; backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.1); }
        h2 { text-align: center; }
        form { display: flex; flex-direction: column; }
        input[type="text"], input[type="password"] { padding: 10px; margin: 10px 0; border: none; border-radius: 5px; }
        input[type="submit"] { padding: 10px; background: #0f0; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>User Login</h2>
        <form id="userLogin">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <input type="submit" value="Login">
        </form>
        <h2>Admin Login</h2>
        <form id="adminLogin">
            <input type="text" id="adminUsername" placeholder="Admin Username" required>
            <input type="password" id="adminPassword" placeholder="Admin Password" required>
            <input type="submit" value="Login">
        </form>
    </div>
    <script>
        document.getElementById('userLogin').onsubmit = function(e) {
            e.preventDefault();
            // Simulated login for user
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (username === 'user' && password === 'password') {
                alert('User Dashboard');
            } else {
                alert('Invalid credentials!');
            }
        };
        document.getElementById('adminLogin').onsubmit = function(e) {
            e.preventDefault();
            // Simulated login for admin
            const adminUsername = document.getElementById('adminUsername').value;
            const adminPassword = document.getElementById('adminPassword').value;
            if (adminUsername === 'admin' && adminPassword === 'adminpass') {
                alert('Admin Dashboard');
            } else {
                alert('Invalid credentials!');
            }
        };
    </script>
</body>
</html>
