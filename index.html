<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA SAMP UCP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0e0e0e;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            padding: 20px;
            width: 300px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
        h1, h2 {
            text-align: center;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #00bfff;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #008cff;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GTA SAMP UCP</h1>
        <div id="register" class="form">
            <h2>Registration</h2>
            <input type="text" id="reg-username" placeholder="Username" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <button onclick="registerUser()">Register</button>
            <p>Already have an account? <a href="#" onclick="toggleForms()">Login</a></p>
        </div>
        <div id="login" class="form hidden">
            <h2>Login</h2>
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button onclick="loginUser()">Login</button>
            <p>Don't have an account? <a href="#" onclick="toggleForms()">Register</a></p>
        </div>
        <div id="player-panel" class="hidden">
            <h2>Player Panel</h2>
            <button onclick="logout()">Logout</button>
        </div>
        <div id="admin-dashboard" class="hidden">
            <h2>Admin Dashboard</h2>
            <button onclick="logout()">Logout</button>
        </div>
    </div>
    <script>
        function toggleForms() {
            document.getElementById("register").classList.toggle("hidden");
            document.getElementById("login").classList.toggle("hidden");
        }

        function registerUser() {
            const username = document.getElementById("reg-username").value;
            const password = document.getElementById("reg-password").value;
            localStorage.setItem(username, password);
            alert("Registration successful!");
            toggleForms();
        }

        function loginUser() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            if (localStorage.getItem(username) === password) {
                alert("Login successful!");
                document.getElementById("login").classList.add("hidden");
                document.getElementById("player-panel").classList.remove("hidden");
            } else {
                alert("Invalid credentials!");
            }
        }

        function logout() {
            document.getElementById("player-panel").classList.add("hidden");
            document.getElementById("admin-dashboard").classList.add("hidden");
            toggleForms();
        }
    </script>
</body>
</html>
